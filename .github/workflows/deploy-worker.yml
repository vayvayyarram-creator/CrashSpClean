name: Deploy Moon Worker to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - 'cloudflare/**'
      - '.github/workflows/deploy-worker.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  test:
    name: Lint + Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts || true

  deploy:
    name: Deploy to Cloudflare
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare
          command: d1 migrations apply moon-auth --remote

      - name: Publish to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare
          command: deploy
          # Deploy to specific environment if specified
          # envName: ${{ github.event.inputs.environment }}

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" https://${{ steps.deploy.outputs.deployment-url }}/ping)
          echo "Smoke test status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed!"
            exit 1
          fi
