name: Test Tag Push

on:
  push:
    tags:
      - 'v*'

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Greet
        run: |
          echo "Tag push triggered!"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "Version: ${GITHUB_REF#refs/tags/}"

      - name: Update D1 (smoke test)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::warning:: CF_TOKEN empty"
            exit 0
          fi
          curl -fsS "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CF_TOKEN" > /dev/null && echo "✔ CF token valid"
